<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — BloodLink</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand"><a href="index.html" style="text-decoration:none;color:inherit"><span class="drop">🩸</span> BloodLink</a></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="find-donor.html">Find Donor</a>
      <a href="emergency.html">🚨 Emergency</a>
      <a href="register.html" class="btn-nav">Register</a>
    </div>
    <button class="hamburger" onclick="toggleMenu()">☰</button>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="find-donor.html">Find Donor</a>
    <a href="emergency.html">Emergency</a>
    <a href="register.html">Register</a>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">🩸 BloodLink</div>
      <h2>Welcome Back</h2>
      <p class="auth-sub">Login to your account</p>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login_email" placeholder="you@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login_pass" placeholder="Your password"/>
      </div>

      <div class="error-msg" id="loginError"></div>
      <button class="btn-primary full" onclick="doLogin()">Login →</button>
      <p class="auth-link">No account? <a href="register.html">Register here</a></p>

      <!-- Demo hint -->
      <div class="demo-hint">
        <p>🧪 <strong>Demo Accounts</strong></p>
        <button onclick="demoLogin('donor')" class="demo-btn">Login as Donor</button>
        <button onclick="demoLogin('user')" class="demo-btn">Login as User</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function doLogin() {
      const email = document.getElementById('login_email').value.trim();
      const pass = document.getElementById('login_pass').value;
      const err = document.getElementById('loginError');

      if (!email || !pass) { err.textContent = '⚠️ Please fill all fields.'; return; }

      const users = JSON.parse(localStorage.getItem('bl_users') || '[]');
      const user = users.find(u => u.email === email && u.pass === pass);

      if (!user) { err.textContent = '⚠️ Invalid email or password.'; return; }

      localStorage.setItem('bl_session', JSON.stringify({
        id: user.id, name: user.name, email: user.email,
        bloodGroup: user.bloodGroup, city: user.city, isDonor: user.isDonor
      }));
      window.location.href = 'index.html';
    }

    function demoLogin(type) {
      // Create demo accounts if not exist
      const users = JSON.parse(localStorage.getItem('bl_users') || '[]');

      if (type === 'donor') {
        const exists = users.find(u => u.email === 'demo.donor@bloodlink.pk');
        if (!exists) {
          const demoUser = {
            id: 'demo1', name: 'Ahmed Khan', email: 'demo.donor@bloodlink.pk',
            pass: 'demo123', phone: '0300-1234567', bloodGroup: 'O+',
            city: 'Lahore', age: 28, gender: 'Male', isDonor: true,
            availability: ['morning', 'emergency'], medical: 'none',
            createdAt: new Date().toISOString(), donationsCount: 5
          };
          users.push(demoUser);
          localStorage.setItem('bl_users', JSON.stringify(users));

          const donors = JSON.parse(localStorage.getItem('bl_donors') || '[]');
          if (!donors.find(d => d.id === 'demo1')) {
            donors.push({ id: 'demo1', name: 'Ahmed Khan', bloodGroup: 'O+', city: 'Lahore', age: 28, gender: 'Male', phone: '0300-1234567', availability: ['morning','emergency'], medical: 'none', donationsCount: 5, available: true });
            localStorage.setItem('bl_donors', JSON.stringify(donors));
          }
        }
        localStorage.setItem('bl_session', JSON.stringify({ id: 'demo1', name: 'Ahmed Khan', email: 'demo.donor@bloodlink.pk', bloodGroup: 'O+', city: 'Lahore', isDonor: true }));
      } else {
        const exists = users.find(u => u.email === 'demo.user@bloodlink.pk');
        if (!exists) {
          users.push({ id: 'demo2', name: 'Sara Malik', email: 'demo.user@bloodlink.pk', pass: 'demo123', phone: '0311-9876543', bloodGroup: 'A+', city: 'Karachi', age: 25, gender: 'Female', isDonor: false, createdAt: new Date().toISOString() });
          localStorage.setItem('bl_users', JSON.stringify(users));
        }
        localStorage.setItem('bl_session', JSON.stringify({ id: 'demo2', name: 'Sara Malik', email: 'demo.user@bloodlink.pk', bloodGroup: 'A+', city: 'Karachi', isDonor: false }));
      }
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
